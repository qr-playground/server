name: Deploy to AWS (Develop)

on:
  push:
    branches: [develop]

# 동시 실행 제어 설정
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true # ‼️ 동시 실행 취소 설정

# 환경 변수 설정 (GitHub Secrets에서 가져옴)
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # 🚀 Docker 이미지 빌드 및 ECR 푸시
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Spring Boot 설정 파일 생성
      # GitHub Secrets에 저장된 설정 파일들을 실제 파일로 생성
      - name: Generate Spring config files
        run: |
          # resources 디렉토리 생성
          mkdir -p src/main/resources
          # 개발 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-dev.yaml
          ${{ secrets.APPLICATION_DEV_YAML }}
          EOF
          # 테스트 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-test.yaml
          ${{ secrets.APPLICATION_TEST_YAML }}
          EOF
          # 환경 변수 파일 생성
          cat << 'EOF' > src/main/.env
          ${{ secrets.APPLICATION_ENV }}
          EOF
      # 3️⃣ Java 개발 환경 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      # 4️⃣ Gradle을 사용한 애플리케이션 빌드
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 5️⃣ AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6️⃣ Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 7️⃣ Docker 이미지 빌드 및 태그 설정
      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시를 태그로 하는 이미지 빌드
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            .
          # latest 태그도 함께 설정 (최신 버전 표시용)
          docker tag \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
      # 8️⃣ ECR에 Docker 이미지 푸시
      - name: Push to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          # latest 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
  # 🚀 EC2 서버에 배포
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ EC2 서버에 SSH 접속하여 배포 스크립트 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ${{ secrets.EC2_APP_USER }}
          key: ${{ secrets.EC2_APP_SSH_KEY }}
          port: 22
          script: |
            set -e
            # 1️⃣ 환경 변수 설정 및 필수 도구 설치
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            export ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker 설치 중..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl enable --now docker
            fi
            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose 설치 중..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi
            if ! command -v aws >/dev/null 2>&1; then
              echo "AWS CLI 설치 중..."
              sudo yum install -y awscli
            fi
            if ! command -v git >/dev/null 2>&1; then
              echo "Git 설치 중..."
              sudo yum install -y git
            fi
            # 2️⃣ 배포용 코드 동기화
            if [ ! -d ~/deploy ]; then
              echo "배포용 코드 클론 중..."
              git clone https://github.com/qr-playground/server.git \
                --branch develop --single-branch ~/deploy
            else
              echo "배포용 코드 업데이트 중..."
              cd ~/deploy
              
              # 로컬 변경사항 백업 (nginx 설정 파일들)
              if [ -f nginx-upstream.conf ]; then
                cp nginx-upstream.conf nginx-upstream.conf.backup
              fi
              if [ -f nginx-upstream-blue.conf ]; then
                cp nginx-upstream-blue.conf nginx-upstream-blue.conf.backup
              fi
              if [ -f nginx-upstream-green.conf ]; then
                cp nginx-upstream-green.conf nginx-upstream-green.conf.backup
              fi
              
              # 로컬 변경사항 스태시
              git stash push -m "Auto-stash before deploy $(date)"
              
              # 원격 저장소에서 최신 코드 가져오기
              git pull origin develop
              
              # 백업된 설정 파일들 복원
              if [ -f nginx-upstream.conf.backup ]; then
                mv nginx-upstream.conf.backup nginx-upstream.conf
              fi
              if [ -f nginx-upstream-blue.conf.backup ]; then
                mv nginx-upstream-blue.conf.backup nginx-upstream-blue.conf
              fi
              if [ -f nginx-upstream-green.conf.backup ]; then
                mv nginx-upstream-green.conf.backup nginx-upstream-green.conf
              fi
            fi
            # 3️⃣ Docker 이미지 업데이트
            echo "ECR 로그인 및 최신 이미지 다운로드 중..."
            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"
            sudo docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            # 4️⃣ 블루-그린 배포 (무중단 배포)
            cd ~/deploy

            # 현재 활성 환경 확인 (컨테이너 기반으로 판단)
            CURRENT_ENV="none"
            if sudo docker ps --format "{{.Names}}" | grep -q "^app-blue$"; then
                if sudo docker ps --format "{{.Names}}" | grep -q "^app-green$"; then
                    # 둘 다 실행 중이면 nginx upstream 설정으로 판단
                    if grep -q "app-blue:8080" nginx-upstream.conf 2>/dev/null; then
                        CURRENT_ENV="blue"
                        NEW_ENV="green"
                    elif grep -q "app-green:8080" nginx-upstream.conf 2>/dev/null; then
                        CURRENT_ENV="green" 
                        NEW_ENV="blue"
                    else
                        CURRENT_ENV="blue"  # 기본값
                        NEW_ENV="green"
                    fi
                else
                    # blue만 실행 중
                    CURRENT_ENV="blue"
                    NEW_ENV="green"
                fi
            elif sudo docker ps --format "{{.Names}}" | grep -q "^app-green$"; then
                # green만 실행 중
                CURRENT_ENV="green"
                NEW_ENV="blue"
            else
                # 둘 다 없으면 첫 배포 - 블루부터 시작
                CURRENT_ENV="none"
                NEW_ENV="blue"
            fi

            echo "🔵🟢 현재 환경: $CURRENT_ENV, 새 환경: $NEW_ENV"

            # 환경 변수 파일 생성
            cat << 'EOF' > .env
            ${{ secrets.APPLICATION_ENV }}
            EOF

            # 업스트림 설정 파일들 생성 (처음 배포시)
            if [ ! -f nginx-upstream.conf ]; then
                cat << 'EOF' > nginx-upstream.conf
            upstream app_backend {
                server app-blue:8080 max_fails=3 fail_timeout=30s;
            }
            EOF
            fi

            if [ ! -f nginx-upstream-blue.conf ]; then
                cat << 'EOF' > nginx-upstream-blue.conf
            upstream app_backend {
                server app-blue:8080 max_fails=3 fail_timeout=30s;
            }
            EOF
            fi

            if [ ! -f nginx-upstream-green.conf ]; then
                cat << 'EOF' > nginx-upstream-green.conf
            upstream app_backend {
                server app-green:8080 max_fails=3 fail_timeout=30s;
            }
            EOF
            fi

                        # Nginx 설정 동기화
            if [ "$CURRENT_ENV" = "blue" ]; then
                cp nginx-upstream-blue.conf nginx-upstream.conf
            elif [ "$CURRENT_ENV" = "green" ]; then
                cp nginx-upstream-green.conf nginx-upstream.conf
            else
                cp nginx-upstream-blue.conf nginx-upstream.conf
            fi

            # Nginx 시작/재시작
            if ! sudo docker ps --format "{{.Names}}" | grep -q "^nginx$"; then
                echo "🔧 Nginx 시작 중..."
                sudo docker-compose -f docker-compose.app.yml up -d nginx
            else
                sudo docker-compose -f docker-compose.app.yml restart nginx
            fi

            sleep 5

            # 새 환경 배포
            if [ "$NEW_ENV" = "blue" ]; then
                echo "🔵 블루 환경 배포 중..."
                sudo docker-compose -f docker-compose.app.yml up -d app-blue
            else
                echo "🟢 그린 환경 배포 중..."
                sudo docker-compose -f docker-compose.app.yml --profile green up -d app-green
            fi

            # 헬스체크
            echo "🏥 $NEW_ENV 환경 헬스체크 시작..."
            sleep 30

            echo "📊 컨테이너 상태:"
            sudo docker ps --filter "name=app-$NEW_ENV,nginx" --format "table {{.Names}}\t{{.Status}}"

            HEALTH_SUCCESS=false
            for i in {1..30}; do
                if curl -f -s "http://localhost/health" > /dev/null 2>&1; then
                    echo "✅ $NEW_ENV 환경 헬스체크 성공! (시도 $i/30)"
                    HEALTH_SUCCESS=true
                    break
                fi
                echo "⏳ $NEW_ENV 헬스체크 재시도 중... ($i/30)"
                sleep 10
            done

            if [ "$HEALTH_SUCCESS" = "true" ]; then
                # 다운타임 측정 시작
                DOWNTIME_START=$(date +%s)
                echo "⏰ 트래픽 전환 시작 시간: $(date)"
                
                # 트래픽 전환 (업스트림 변경)
                echo "🔄 트래픽을 $NEW_ENV 환경으로 전환 중..."
                
                if [ "$NEW_ENV" = "blue" ]; then
                    cp nginx-upstream-blue.conf nginx-upstream.conf
                else
                    cp nginx-upstream-green.conf nginx-upstream.conf
                fi
                
                # Nginx 컨테이너 재시작으로 설정 적용
                echo "🔄 nginx 재시작 중... (서비스 일시 중단)"
                sudo docker-compose -f docker-compose.app.yml restart nginx
                
                # 트래픽 복구 대기 및 검증
                echo "⏳ 서비스 복구 대기 중..."
                RECOVERY_SUCCESS=false
                for i in {1..30}; do
                    if curl -f -s http://localhost/health > /dev/null 2>&1; then
                        DOWNTIME_END=$(date +%s)
                        DOWNTIME_DURATION=$((DOWNTIME_END - DOWNTIME_START))
                        echo "✅ 서비스 복구 완료! (복구 시간: ${DOWNTIME_DURATION}초)"
                        RECOVERY_SUCCESS=true
                        break
                    fi
                    sleep 2
                done
                
                if [ "$RECOVERY_SUCCESS" = "true" ]; then
                    echo "✅ 트래픽 전환 검증 성공!"
                    
                    # 이전 환경 정리
                    if [ "$CURRENT_ENV" != "none" ]; then
                        if [ "$CURRENT_ENV" = "blue" ]; then
                            sudo docker-compose -f docker-compose.app.yml stop app-blue
                            sudo docker-compose -f docker-compose.app.yml rm -f app-blue
                        else
                            sudo docker-compose -f docker-compose.app.yml stop app-green
                            sudo docker-compose -f docker-compose.app.yml rm -f app-green
                        fi
                    fi
                    
                    # 최종 배포 성공 및 현재 버전 확인
                    FINAL_VERSION=$(curl -s http://localhost/actuator/info 2>/dev/null | grep -o '"version":"[^"]*"' | cut -d'"' -f4 || echo "unknown")
                    echo ""
                    echo "🎉 ===== 블루-그린 배포 성공! ====="
                    echo "🔵🟢 현재 활성 환경: $NEW_ENV"
                    echo "📦 배포 버전: $FINAL_VERSION"
                    echo "⏱️  다운타임: ${DOWNTIME_DURATION}초"
                    echo "⏰ 배포 완료 시간: $(date)"
                    echo "================================"
                else
                    echo "❌ 서비스 복구 실패 - 롤백 시도"
                    
                    # 롤백: 이전 환경으로 트래픽 되돌리기
                    if [ "$CURRENT_ENV" != "none" ]; then
                        echo "🔄 이전 환경($CURRENT_ENV)으로 롤백 중..."
                        if [ "$CURRENT_ENV" = "blue" ]; then
                            cp nginx-upstream-blue.conf nginx-upstream.conf
                        else
                            cp nginx-upstream-green.conf nginx-upstream.conf
                        fi
                        
                        sudo docker-compose -f docker-compose.app.yml restart nginx
                        sleep 10
                        echo "✅ 트래픽 롤백 완료"
                    fi
                    
                    # 실패한 새 환경 정리
                    if [ "$NEW_ENV" = "blue" ]; then
                        sudo docker-compose -f docker-compose.app.yml stop app-blue
                        sudo docker-compose -f docker-compose.app.yml rm -f app-blue
                    else
                        sudo docker-compose -f docker-compose.app.yml stop app-green
                        sudo docker-compose -f docker-compose.app.yml rm -f app-green
                    fi
                    
                    echo ""
                    echo "💥 ===== 배포 실패 ====="
                    echo "🔵🟢 현재 활성 환경: $CURRENT_ENV (롤백됨)"
                    echo "❌ 실패 원인: 서비스 복구 실패"
                    echo "⏰ 실패 시간: $(date)"
                    echo "==================="
                    exit 1
                fi
            else
                # 헬스체크 실패
                if [ "$NEW_ENV" = "blue" ]; then
                    sudo docker-compose -f docker-compose.app.yml stop app-blue || true
                    sudo docker-compose -f docker-compose.app.yml rm -f app-blue || true
                else
                    sudo docker-compose -f docker-compose.app.yml stop app-green || true
                    sudo docker-compose -f docker-compose.app.yml rm -f app-green || true
                fi
                
                echo ""
                echo "💥 ===== 배포 실패 ====="
                echo "🔵🟢 현재 활성 환경: $CURRENT_ENV (변경 없음)"
                echo "❌ 실패 원인: $NEW_ENV 환경 헬스체크 실패"
                echo "⏰ 실패 시간: $(date)"
                echo "==================="
                exit 1
            fi

            # 정리 작업
            sudo docker image prune -f
