name: Deploy to AWS (Develop)

on:
  push:
    branches: [develop]

# 동시 실행 제어 설정
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true # ‼️ 동시 실행 취소 설정

# 환경 변수 설정 (GitHub Secrets에서 가져옴)
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # 🚀 Docker 이미지 빌드 및 ECR 푸시
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Spring Boot 설정 파일 생성
      # GitHub Secrets에 저장된 설정 파일들을 실제 파일로 생성
      - name: Generate Spring config files
        run: |
          # resources 디렉토리 생성
          mkdir -p src/main/resources

          # 개발 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-dev.yaml
          ${{ secrets.APPLICATION_DEV_YAML }}
          EOF

          # 테스트 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-test.yaml
          ${{ secrets.APPLICATION_TEST_YAML }}
          EOF

          # 환경 변수 파일 생성
          cat << 'EOF' > src/main/.env
          ${{ secrets.APPLICATION_ENV }}
          EOF

      # 3️⃣ Java 개발 환경 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      # 4️⃣ Gradle을 사용한 애플리케이션 빌드
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 5️⃣ AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6️⃣ Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 7️⃣ Docker 이미지 빌드 및 태그 설정
      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시를 태그로 하는 이미지 빌드
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            .
          # latest 태그도 함께 설정 (최신 버전 표시용)
          docker tag \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      # 8️⃣ ECR에 Docker 이미지 푸시
      - name: Push to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          # latest 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  # 🚀 EC2 서버에 배포
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ EC2 서버에 SSH 접속하여 배포 스크립트 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ${{ secrets.EC2_APP_USER }}
          key: ${{ secrets.EC2_APP_SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1️⃣ 환경 변수 설정 및 필수 도구 설치

            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            export ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker 설치 중..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl enable --now docker
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose 설치 중..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if ! command -v aws >/dev/null 2>&1; then
              echo "AWS CLI 설치 중..."
              sudo yum install -y awscli
            fi

            if ! command -v git >/dev/null 2>&1; then
              echo "Git 설치 중..."
              sudo yum install -y git
            fi

            # 2️⃣ 배포용 코드 동기화

            if [ ! -d ~/deploy ]; then
              echo "배포용 코드 클론 중..."
              git clone https://github.com/qr-playground/server.git \
                --branch develop --single-branch ~/deploy
            else
              echo "배포용 코드 업데이트 중..."
              cd ~/deploy
              git pull origin develop
            fi

            # 3️⃣ Docker 이미지 업데이트

            echo "ECR 로그인 및 최신 이미지 다운로드 중..."
            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"
            sudo docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

            # 4️⃣ 애플리케이션 배포 (헬스체크 & 롤백 포함)

            cd ~/deploy

            # 현재 실행 중인 이미지 백업
            CURRENT_IMAGE=$(sudo docker ps --format "{{.Image}}" | grep "$ECR_REPOSITORY" | head -1 || echo "none")
            echo "현재 이미지 백업: $CURRENT_IMAGE"

            # 배포 함수 정의
            deploy_new_version() {
              echo "새 버전 배포 시작..."
              
              # 환경 변수 파일 생성
              cat << 'EOF' > .env
            ${{ secrets.APPLICATION_ENV }}
            EOF
              
              # 기존 컨테이너 중지 및 새 컨테이너 시작
              sudo docker-compose -f docker-compose.app.yml down
              sudo docker-compose -f docker-compose.app.yml up -d
              
              # 컨테이너 시작 대기 (30초)
              echo "컨테이너 시작 대기 중..."
              sleep 30
              
              # 헬스체크 (최대 5분, 10초 간격)
              echo "헬스체크 시작..."
              for i in {1..30}; do
                if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
                  echo "✅ 헬스체크 성공! (시도 $i/30)"
                  return 0
                fi
                echo "⏳ 헬스체크 실패, 재시도 중... ($i/30)"
                sleep 10
              done
              
              echo "❌ 헬스체크 실패 - 5분 내에 서비스가 정상화되지 않음"
              return 1
            }

            # 롤백 함수 정의
            rollback_to_previous() {
              echo "🔄 롤백 시작..."
              
              if [ "$CURRENT_IMAGE" = "none" ]; then
                echo "❌ 이전 이미지가 없어 롤백할 수 없습니다"
                return 1
              fi
              
              echo "이전 이미지로 롤백: $CURRENT_IMAGE"
              
              # 현재 컨테이너 중지
              sudo docker-compose -f docker-compose.app.yml down
              
              # docker-compose.yml에서 이미지 태그를 이전 버전으로 변경
              sed -i "s|image:.*|image: $CURRENT_IMAGE|g" docker-compose.app.yml
              
              # 이전 버전으로 컨테이너 시작
              sudo docker-compose -f docker-compose.app.yml up -d
              
              # 롤백 후 헬스체크
              sleep 30
              for i in {1..10}; do
                if curl -f -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
                  echo "✅ 롤백 성공! 이전 버전이 정상 동작 중"
                  return 0
                fi
                echo "⏳ 롤백 헬스체크 중... ($i/10)"
                sleep 10
              done
              
              echo "❌ 롤백 실패 - 이전 버전도 정상 동작하지 않음"
              return 1
            }

            # 배포 실행
            if deploy_new_version; then
              echo "🎉 배포 성공!"
              
              # 이전 이미지 명시적 삭제 (현재 실행 중인 이미지는 자동 보호됨)
              if [ "$CURRENT_IMAGE" != "none" ]; then
                echo "🧹 이전 이미지 정리 중: $CURRENT_IMAGE"
                sudo docker rmi "$CURRENT_IMAGE" || echo "⚠️ 이전 이미지 정리 실패 (사용 중일 수 있음)"
              fi
              
            else
              echo "⚠️ 새 버전 배포 실패, 롤백 시도 중..."
              if rollback_to_previous; then
                echo "🔄 롤백 완료 - 이전 버전으로 복구됨"
                
                # 실패한 새 이미지 정리
                NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
                echo "🧹 실패한 새 이미지 정리 중: $NEW_IMAGE"
                sudo docker rmi "$NEW_IMAGE" || echo "⚠️ 새 이미지 정리 실패"
                
                exit 1  # GitHub Actions에서 실패로 표시
              else
                echo "💥 롤백도 실패 - 수동 복구 필요"
                exit 1
              fi
            fi

            # 5️⃣ 정리 작업

            echo "🧹 dangling 이미지 정리 중..."
            sudo docker image prune -f

            echo "✅ 배포 완료!"
