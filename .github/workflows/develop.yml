name: Deploy to AWS (Develop)

on:
  push:
    branches: [ develop ]

env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ─────────────────────────────────────────────────────
      # ❶ 시크릿에서 리소스(application-*.yml) 꺼내오기
      - name: Generate Spring config files
        run: |
              mkdir -p src/main/resources

                  cat << 'EOF' > src/main/resources/application-local-docker.yml
              ${{ secrets.APPLICATION_LOCAL_DOCKER_YML }}
              EOF

                  cat << 'EOF' > src/main/resources/application-test.yml
              ${{ secrets.APPLICATION_TEST_YML }}
              EOF

                  cat << 'EOF' > src/main/.env
              ${{ secrets.APPLICATION_ENV }}
              EOF

      # ─────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ─────────────────────────────────────────────────────
      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            .
          docker tag \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Push to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_APP_HOST }}                
          username: ${{ secrets.EC2_APP_USER }}            
          key: ${{ secrets.EC2_APP_SSH_KEY }}              
          port: 22
          script: |
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ needs.build_and_push.outputs.ecr-registry }}

            docker pull ${{ needs.build_and_push.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:latest

            cd ~/deploy/docker-compose

            docker-compose -f docker-compose.app.yml pull app
            docker-compose -f docker-compose.app.yml up -d app

            docker image prune -f