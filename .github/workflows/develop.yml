name: Deploy to AWS (Develop)

on:
  push:
    branches: [develop]

# 동시 실행 제어 설정
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true # ‼️ 동시 실행 취소 설정

# 환경 변수 설정 (GitHub Secrets에서 가져옴)
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # 🚀 Docker 이미지 빌드 및 ECR 푸시
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 소스 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Spring Boot 설정 파일 생성
      # GitHub Secrets에 저장된 설정 파일들을 실제 파일로 생성
      - name: Generate Spring config files
        run: |
          # resources 디렉토리 생성
          mkdir -p src/main/resources

          # 개발 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-dev.yaml
          ${{ secrets.APPLICATION_DEV_YAML }}
          EOF

          # 테스트 환경 설정 파일 생성
          cat << 'EOF' > src/main/resources/application-test.yaml
          ${{ secrets.APPLICATION_TEST_YAML }}
          EOF

          # 환경 변수 파일 생성
          cat << 'EOF' > src/main/.env
          ${{ secrets.APPLICATION_ENV }}
          EOF

      # 3️⃣ Java 개발 환경 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      # 4️⃣ Gradle을 사용한 애플리케이션 빌드
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 5️⃣ AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 6️⃣ Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # 7️⃣ Docker 이미지 빌드 및 태그 설정
      - name: Build and tag Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시를 태그로 하는 이미지 빌드
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            .
          # latest 태그도 함께 설정 (최신 버전 표시용)
          docker tag \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      # 8️⃣ ECR에 Docker 이미지 푸시
      - name: Push to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 커밋 해시 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          # latest 태그 이미지 푸시
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  # 🚀 EC2 서버에 배포
  deploy:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ EC2 서버에 SSH 접속하여 배포 스크립트 실행
      - name: SSH & Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_APP_HOST }}
          username: ${{ secrets.EC2_APP_USER }}
          key: ${{ secrets.EC2_APP_SSH_KEY }}
          port: 22
          script: |
            set -e

            # 1️⃣ 환경 변수 설정 및 필수 도구 설치

            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            export AWS_REGION="${{ secrets.AWS_REGION }}"
            export ECR_REGISTRY="${{ secrets.ECR_REGISTRY }}"
            export ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY }}"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker 설치 중..."
              sudo yum update -y
              sudo yum install -y docker
              sudo systemctl enable --now docker
            fi

            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "Docker Compose 설치 중..."
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.20.2/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            if ! command -v aws >/dev/null 2>&1; then
              echo "AWS CLI 설치 중..."
              sudo yum install -y awscli
            fi

            if ! command -v git >/dev/null 2>&1; then
              echo "Git 설치 중..."
              sudo yum install -y git
            fi

            # 2️⃣ 배포용 코드 동기화

            if [ ! -d ~/deploy ]; then
              echo "배포용 코드 클론 중..."
              git clone https://github.com/qr-playground/server.git \
                --branch develop --single-branch ~/deploy
            else
              echo "배포용 코드 업데이트 중..."
              cd ~/deploy
              git pull origin develop
            fi

            # 3️⃣ Docker 이미지 업데이트

            echo "ECR 로그인 및 최신 이미지 다운로드 중..."
            aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"
            sudo docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

                        # 4️⃣ 블루-그린 배포 (무중단 배포)

            cd ~/deploy

            # 현재 활성 환경 확인
            echo "🔍 현재 실행 중인 컨테이너 확인:"
            sudo docker ps | grep -E "(app-blue|app-green)" || echo "실행 중인 앱 컨테이너 없음"

            # 환경 감지
            CURRENT_ENV="none"
            if curl -f -s http://localhost/health/blue > /dev/null 2>&1; then
                CURRENT_ENV="blue"
                NEW_ENV="green"
            elif curl -f -s http://localhost/health/green > /dev/null 2>&1; then
                CURRENT_ENV="green"
                NEW_ENV="blue"
            else
                # 첫 배포 또는 모든 환경이 다운된 상태
                CURRENT_ENV="none"
                NEW_ENV="blue"  # 첫 배포는 블루부터
                echo "🎯 첫 배포 또는 전체 다운 상태 감지"
            fi

            echo "🔵🟢 현재 환경: $CURRENT_ENV, 새 환경: $NEW_ENV"

            # 블루-그린 배포 함수
            deploy_blue_green() {
              echo "🚀 $NEW_ENV 환경에 새 버전 배포 시작..."
              
              # 환경 변수 파일 생성
              cat << 'EOF' > .env
            ${{ secrets.APPLICATION_ENV }}
            EOF

              # 새 환경에만 새 이미지 배포
              if [ "$NEW_ENV" = "blue" ]; then
                echo "🔵 블루 환경 배포 중..."
                sudo docker-compose -f docker-compose.app.yml up -d app-blue nginx
              else
                echo "🟢 그린 환경 배포 중..."
                sudo docker-compose -f docker-compose.app.yml --profile green up -d app-green nginx
              fi
              
              # 새 환경 헬스체크 (5분)
              echo "🏥 $NEW_ENV 환경 헬스체크 시작..."
              
              # 디버깅: 컨테이너 상태 확인
              echo "📋 컨테이너 상태 확인:"
              sudo docker ps | grep -E "(nginx|app-blue|app-green)"
              
              # 디버깅: Nginx 설정 확인
              echo "📋 Nginx 업스트림 설정:"
              sudo docker exec nginx cat /etc/nginx/conf.d/upstream.conf || echo "업스트림 설정 파일 없음"
              
              sleep 30
              
              for i in {1..30}; do
                # 디버깅: 헬스체크 응답 확인
                echo "🔍 헬스체크 시도 $i/30: http://localhost/health/$NEW_ENV"
                HEALTH_RESPONSE=$(curl -f -s "http://localhost/health/$NEW_ENV" 2>&1)
                HEALTH_STATUS=$?
                
                if [ $HEALTH_STATUS -eq 0 ]; then
                  echo "✅ $NEW_ENV 환경 헬스체크 성공! (시도 $i/30)"
                  echo "📄 응답: $HEALTH_RESPONSE"
                  
                  # 트래픽 전환 (Nginx 업스트림 변경)
                  switch_traffic_to_new_env
                  
                  # 트래픽 전환 후 검증 (10초 대기 후 확인)
                  sleep 10
                  if curl -f -s http://localhost/actuator/health > /dev/null 2>&1; then
                    echo "✅ 트래픽 전환 성공!"
                    
                    # 이전 환경 정리
                    cleanup_old_env
                    return 0
                                  else
                  echo "❌ 트래픽 전환 실패"
                  return 1
                fi
              else
                echo "❌ 헬스체크 실패 (상태코드: $HEALTH_STATUS)"
                echo "📄 에러 응답: $HEALTH_RESPONSE"
                
                # 추가 디버깅: 컨테이너 로그 확인
                if [ $i -eq 5 ] || [ $i -eq 15 ]; then
                  echo "📋 $NEW_ENV 컨테이너 로그 (최근 10줄):"
                  sudo docker logs --tail 10 "app-$NEW_ENV" || echo "컨테이너 로그 확인 실패"
                fi
              fi
              echo "⏳ $NEW_ENV 헬스체크 재시도 중... ($i/30)"
              sleep 10
            done
              
              echo "❌ $NEW_ENV 환경 헬스체크 실패"
              return 1
            }

            # 트래픽 전환 함수
            switch_traffic_to_new_env() {
              echo "🔄 트래픽을 $NEW_ENV 환경으로 전환 중..."
              
              # 업스트림 설정 파일 교체
              if [ "$NEW_ENV" = "blue" ]; then
                cp nginx-upstream-blue.conf nginx-upstream.conf
              else
                cp nginx-upstream-green.conf nginx-upstream.conf
              fi
              
              # Docker 컨테이너 내부로 파일 복사
              sudo docker cp nginx-upstream.conf nginx:/etc/nginx/conf.d/upstream.conf
              
              # Nginx 설정 리로드 (무중단)
              sudo docker exec nginx nginx -s reload
              
              echo "✅ 트래픽 전환 완료: $NEW_ENV 환경으로"
            }

            # 이전 환경 정리 함수
            cleanup_old_env() {
              echo "🧹 $CURRENT_ENV 환경 정리 중..."
              
              if [ "$CURRENT_ENV" = "blue" ]; then
                sudo docker-compose -f docker-compose.app.yml stop app-blue
                sudo docker-compose -f docker-compose.app.yml rm -f app-blue
              else
                sudo docker-compose -f docker-compose.app.yml stop app-green
                sudo docker-compose -f docker-compose.app.yml rm -f app-green
              fi
              
              echo "✅ $CURRENT_ENV 환경 정리 완료"
            }

            # 롤백 함수 정의
            rollback_blue_green() {
              echo "🔄 $CURRENT_ENV 환경으로 롤백 중..."
              
              # 트래픽을 다시 이전 환경으로 전환
              if [ "$CURRENT_ENV" = "blue" ]; then
                cp nginx-upstream-blue.conf nginx-upstream.conf
              else
                cp nginx-upstream-green.conf nginx-upstream.conf
              fi
              
              sudo docker cp nginx-upstream.conf nginx:/etc/nginx/conf.d/upstream.conf
              sudo docker exec nginx nginx -s reload
              
              echo "✅ 트래픽 롤백 완료: $CURRENT_ENV 환경으로"
              
              # 실패한 새 환경 정리
              if [ "$NEW_ENV" = "blue" ]; then
                sudo docker-compose -f docker-compose.app.yml stop app-blue
                sudo docker-compose -f docker-compose.app.yml rm -f app-blue
              else
                sudo docker-compose -f docker-compose.app.yml stop app-green
                sudo docker-compose -f docker-compose.app.yml rm -f app-green
              fi
              
              echo "✅ 실패한 $NEW_ENV 환경 정리 완료"
            }

            # 블루-그린 배포 실행
            if deploy_blue_green; then
              echo "🎉 블루-그린 배포 성공!"
              
              # 사용되지 않는 이미지 정리
              echo "🧹 사용되지 않는 이미지 정리 중..."
              sudo docker image prune -f
              
            else
              echo "⚠️ 블루-그린 배포 실패, 롤백 시도 중..."
              if rollback_blue_green; then
                echo "🔄 롤백 완료 - $CURRENT_ENV 환경으로 복구됨"
                
                # 실패한 새 이미지 정리
                NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
                echo "🧹 실패한 새 이미지 정리 중: $NEW_IMAGE"
                sudo docker rmi "$NEW_IMAGE" || echo "⚠️ 새 이미지 정리 실패"
                
                exit 1  # GitHub Actions에서 실패로 표시
              else
                echo "💥 롤백도 실패 - 수동 복구 필요"
                exit 1
              fi
            fi

            # 5️⃣ 정리 작업

            echo "🧹 dangling 이미지 정리 중..."
            sudo docker image prune -f

            echo "✅ 배포 완료!"
