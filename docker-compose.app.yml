version: "3.8"

services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-upstream.conf:/etc/nginx/conf.d/upstream.conf:ro # 동적 업스트림 설정 추가
    networks:
      - app-network
    depends_on:
      app-blue:
        condition: service_healthy

  # 블루 환경 (기본 활성)
  app-blue:
    image: "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}"
    container_name: app-blue
    ports:
      - "8080:8080" # 블루 포트
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - app-network

  # 그린 환경 (대기)
  app-green:
    image: "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG:-latest}"
    container_name: app-green
    ports:
      - "8081:8080" # 그린 포트
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    profiles:
      - green # 기본적으로는 시작하지 않음
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
