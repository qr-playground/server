version: "3.8"

# 전체 통합 배포용 docker-compose.yml
# 각 서비스를 개별 인스턴스에 배포할 때는 해당 docker-compose 파일을 사용하세요:
# - docker-compose.app.yml (애플리케이션 서버)
# - docker-compose.db.yml (데이터베이스)
# - docker-compose.monitor.yml (모니터링)

services:
  app:
    build: .
    container_name: app
    ports:
      - "8080:8080"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "2" # CPU 2코어로 제한
          memory: 1G # 전체 메모리 1GB로 제한
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - monitoring
    depends_on:
      - postgres-master
      - postgres-slave

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command: >
      --config.file=/etc/prometheus/prometheus.yml
      --web.enable-remote-write-receiver
      --enable-feature=native-histograms
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    env_file:
      - .env
    ports:
      - "9187:9187" # 내부 포트는 9187 그대로, 호스트 포트만 다르게 매핑
    networks:
      - monitoring
    command:
      - "--collector.stat_statements"
    depends_on:
      - postgres-master

  postgres-master:
    image: groonga/pgroonga:4.0.1-debian-16
    container_name: postgres-master
    env_file:
      - .env
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./init-master.sql:/docker-entrypoint-initdb.d/01-init-master.sql
      - ./pg_hba.conf:/var/lib/postgresql/data_pg/pg_hba.conf
    ports:
      - "5555:5432"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "2" # CPU 2코어로 제한
          memory: 1G # 전체 메모리 1GB로 제한
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c hot_standby=on
      -c shared_preload_libraries='pg_stat_statements,pgroonga_wal_resource_manager'
      -c pgroonga.enable_wal_resource_manager=on
      -c wal_keep_size=1GB
      -c max_connections=200
      -c listen_addresses='*'
      -c hba_file=/var/lib/postgresql/data_pg/pg_hba.conf

  postgres-slave:
    image: groonga/pgroonga:4.0.1-debian-16
    container_name: postgres-slave
    env_file:
      - .env
    volumes:
      - postgres_slave_data:/var/lib/postgresql/data
      - ./init-slave.sh:/docker-entrypoint-initdb.d/01-init-slave.sh
    depends_on:
      - postgres-master
    ports:
      - "5556:5432"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      postgres
      -c hot_standby=on
      -c shared_preload_libraries='pg_stat_statements,pgroonga_wal_resource_manager'
      -c pgroonga.enable_wal_resource_manager=on
      -c primary_conninfo='host=postgres-master port=5432 user=replicator password=repl_password application_name=slave1'
      -c primary_slot_name='replication_slot_slave1'

volumes:
  grafana_data:
  postgres_master_data:
  postgres_slave_data:

networks:
  monitoring:
