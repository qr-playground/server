# PostgreSQL Host-Based Authentication Configuration
# =============================================================================
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# =============================================================================

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            md5

# IPv6 local connections:
host    all             all             ::1/128                 md5

# Docker 네트워크 내부 연결 허용
host    all             all             172.16.0.0/12           md5

# 모든 외부 연결 허용 (개발 환경용)
host    all             all             0.0.0.0/0               md5

# =============================================================================
# 복제 연결 허용 설정
# =============================================================================

# 복제 사용자가 모든 호스트에서 접근 가능 (개발 환경용)
host    replication     replicator      0.0.0.0/0               md5

# Docker 네트워크 내에서만 복제 허용 (더 안전한 설정)
host    replication     replicator      172.16.0.0/12           md5

# Slave 컨테이너에서만 복제 허용 (가장 안전한 설정)
# host    replication     replicator      postgres-slave/32       md5 